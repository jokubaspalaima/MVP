<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no,viewport-fit=cover">
<title>not2day</title>

<!-- PWA -->
<link rel="manifest" href="/manifest.json">
<meta name="theme-color" content="#000000">
<meta name="mobile-web-app-capable" content="yes">
<meta name="application-name" content="not2day">

<!-- iOS specific -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="not2day">
<link rel="apple-touch-icon" href="/icon-192.png">
<link rel="icon" type="image/svg+xml" href="/icon.svg">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">

<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Sora:wght@300;400;600;700;800&display=swap" rel="stylesheet">
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#000;--fg:#fff;
  --dim:rgba(255,255,255,.36);--mid:rgba(255,255,255,.62);
  --red:#e53935;--red-bg:rgba(229,57,53,.12);--red-bd:rgba(229,57,53,.3);
  --card:rgba(255,255,255,.05);--card-bd:rgba(255,255,255,.09);
  --r:13px;--f:'Sora',sans-serif;
}
html,body{height:100%;width:100%;overflow:hidden;background:var(--bg);color:var(--fg);font-family:var(--f)}
button{font-family:var(--f);cursor:pointer;border:none;outline:none;background:none;color:inherit}
input,textarea{font-family:var(--f);background:none;border:none;outline:none;color:var(--fg)}
a{color:inherit;text-decoration:none}

/* grain */
body::after{content:'';position:fixed;inset:-50%;width:200%;height:200%;
  background-image:url("data:image/svg+xml,%3Csvg viewBox='0 0 200 200' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.85' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)'/%3E%3C/svg%3E");
  opacity:.022;pointer-events:none;z-index:9999;animation:grain .9s steps(2) infinite}
@keyframes grain{0%{transform:translate(0,0)}50%{transform:translate(1%,-1%)}100%{transform:translate(-1%,1%)}}

/* screens */
#app{position:fixed;inset:0}
.screen{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;
  padding:52px 28px 48px;opacity:0;pointer-events:none;
  transition:opacity .42s cubic-bezier(.4,0,.2,1),transform .42s cubic-bezier(.4,0,.2,1);transform:translateY(16px)}
.screen.active{opacity:1;pointer-events:all;transform:translateY(0)}
.screen.exit{opacity:0;transform:translateY(-16px);pointer-events:none}
.screen.scroll{justify-content:flex-start;overflow-y:auto;-webkit-overflow-scrolling:touch}

/* buttons */
.btn{display:flex;align-items:center;justify-content:center;gap:8px;width:100%;max-width:340px;
  padding:20px 28px;border-radius:var(--r);font-size:1rem;font-weight:600;letter-spacing:.01em;
  transition:opacity .14s,transform .14s;user-select:none;cursor:pointer}
.btn:active{transform:scale(.97);opacity:.78}
.btn-white  {background:#fff;color:#000}
.btn-red    {background:var(--red);color:#fff}
.btn-danger {background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.btn-ghost  {background:rgba(255,255,255,.07);color:var(--mid);border:1px solid rgba(255,255,255,.1)}
.btn-outline{background:transparent;color:var(--fg);border:1px solid rgba(255,255,255,.22)}
.btn-stack  {display:flex;flex-direction:column;gap:12px;width:100%;align-items:center}
.brow       {display:flex;gap:8px;width:100%;max-width:340px}
.bsm        {flex:1;display:flex;align-items:center;justify-content:center;gap:5px;
  padding:12px 8px;border-radius:9px;font-size:.8rem;font-weight:600;cursor:pointer;
  transition:opacity .14s,transform .14s}
.bsm:active{opacity:.7;transform:scale(.97)}
.bsm-red    {background:var(--red);color:#fff}
.bsm-ghost  {background:rgba(255,255,255,.08);color:var(--mid);border:1px solid rgba(255,255,255,.1)}
.bsm-dim    {background:transparent;color:var(--dim);border:1px solid rgba(255,255,255,.1)}

/* shared */
.pulse-dot{width:6px;height:6px;border-radius:50%;background:rgba(255,255,255,.22);
  margin:0 auto 44px;animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.18;transform:scale(1)}50%{opacity:.55;transform:scale(1.5)}}
@keyframes popIn{0%{transform:scale(.3);opacity:0}70%{transform:scale(1.12)}100%{transform:scale(1);opacity:1}}
.checkmark{font-size:3rem;display:block;margin-bottom:24px;animation:popIn .5s cubic-bezier(.34,1.56,.64,1) both}
@keyframes fadeUp{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.back-btn{display:flex;align-items:center;gap:7px;color:var(--dim);font-size:.78rem;
  padding:0 0 20px;align-self:flex-start;width:100%;max-width:340px;cursor:pointer;background:none;border:none}
.back-btn:active{opacity:.5}
.s-title{font-size:clamp(1.4rem,5.5vw,1.9rem);font-weight:700;letter-spacing:-.02em;margin-bottom:6px;width:100%;max-width:340px}
.s-sub  {font-size:.8rem;color:var(--dim);margin-bottom:22px;width:100%;max-width:340px}

/* admin / phase badges */
#admin-badge,#phase-badge{
  position:fixed;z-index:9000;padding:4px 10px;border-radius:20px;
  font-size:.6rem;font-weight:700;letter-spacing:.1em;text-transform:uppercase;
  display:none}
#admin-badge{top:max(14px,env(safe-area-inset-top));right:14px;
  background:rgba(229,57,53,.18);border:1px solid rgba(229,57,53,.35);color:var(--red)}
#phase-badge{top:max(14px,env(safe-area-inset-top));left:14px;
  background:rgba(255,255,255,.06);border:1px solid rgba(255,255,255,.1);color:var(--dim)}
#admin-badge.on,#phase-badge.on{display:block}

/* bottom nav */
#nav{position:fixed;bottom:0;left:0;right:0;z-index:500;
  display:none;align-items:center;justify-content:space-around;
  padding:10px 0 max(10px,env(safe-area-inset-bottom));
  background:rgba(0,0,0,.95);border-top:1px solid rgba(255,255,255,.07);
  backdrop-filter:blur(14px);-webkit-backdrop-filter:blur(14px)}
#nav.on{display:flex}
.nb{display:flex;flex-direction:column;align-items:center;gap:4px;padding:4px 14px;
  opacity:.35;transition:opacity .15s;cursor:pointer;background:none;border:none;color:var(--fg)}
.nb.on{opacity:1}
.nb svg{width:19px;height:19px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nb span{font-size:.55rem;letter-spacing:.06em;text-transform:uppercase}

/* unlock banner */
#unlock-banner{position:fixed;bottom:0;left:0;right:0;z-index:700;
  padding:16px 24px max(16px,env(safe-area-inset-bottom));
  background:rgba(0,0,0,.97);border-top:1px solid rgba(255,255,255,.1);
  display:none;flex-direction:column;align-items:center;gap:10px}
#unlock-banner.on{display:flex}
.ub-t{font-size:.95rem;font-weight:700;text-align:center}
.ub-s{font-size:.75rem;color:var(--dim);text-align:center}

/* open screen */
.headline{font-size:clamp(3.2rem,14vw,5.5rem);font-weight:800;line-height:1.0;
  letter-spacing:-.06em;text-align:center;margin-bottom:10px;white-space:pre-line;
  cursor:default;font-variant-numeric:tabular-nums}
.subline{font-size:clamp(.9rem,3.5vw,1.1rem);color:var(--dim);text-align:center;
  margin-bottom:56px;font-weight:300;white-space:pre-line;letter-spacing:.01em}

/* panic screen */
.panic-msg{font-size:clamp(1.3rem,5.5vw,1.9rem);font-weight:600;text-align:center;
  line-height:1.25;letter-spacing:-.02em;margin:24px 0 40px;white-space:pre-line}
.audio-wrap{width:100%;max-width:340px;background:var(--card);border:1px solid var(--card-bd);
  border-radius:var(--r);padding:15px 17px;margin-bottom:18px;display:flex;align-items:center;gap:13px}
.aplay{width:32px;height:32px;border-radius:50%;background:rgba(255,255,255,.09);
  display:flex;align-items:center;justify-content:center;cursor:pointer}
.aplay svg{width:12px;height:12px;fill:#fff}
.atrack{flex:1;display:flex;flex-direction:column;gap:5px}
.alabel{font-size:.66rem;color:var(--dim);letter-spacing:.08em;text-transform:uppercase}
.aprog{height:2px;background:rgba(255,255,255,.1);border-radius:2px;overflow:hidden}
.aprog-fill{height:100%;background:rgba(255,255,255,.55);width:0%;border-radius:2px;transition:width .4s linear}
.waveform{display:flex;align-items:center;gap:3px;height:20px}
.wv{width:2px;border-radius:2px;background:rgba(255,255,255,.28);animation:wv 1.2s ease-in-out infinite}
.wv:nth-child(1){height:5px;animation-delay:0s}.wv:nth-child(2){height:13px;animation-delay:.1s}
.wv:nth-child(3){height:18px;animation-delay:.2s}.wv:nth-child(4){height:9px;animation-delay:.3s}
.wv:nth-child(5){height:15px;animation-delay:.15s}.wv:nth-child(6){height:7px;animation-delay:.25s}
@keyframes wv{0%,100%{transform:scaleY(.3);opacity:.25}50%{transform:scaleY(1);opacity:.65}}
.waveform.paused .wv{animation-play-state:paused}

/* timer */
.ring-wrap{position:relative;width:210px;height:210px;margin:0 auto 8px;
  display:flex;align-items:center;justify-content:center}
.ring-wrap svg{position:absolute;inset:0;transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:rgba(255,255,255,.06);stroke-width:2.5}
.ring-fg{fill:none;stroke:rgba(255,255,255,.82);stroke-width:2.5;stroke-linecap:round;transition:stroke-dashoffset 1s linear}
.ring-inner{display:flex;flex-direction:column;align-items:center;z-index:1}
#t-digits{font-size:clamp(4rem,16vw,6rem);font-weight:700;letter-spacing:-.04em;font-variant-numeric:tabular-nums;line-height:1}
.t-sub{font-size:.76rem;color:var(--dim);letter-spacing:.12em;text-transform:uppercase;margin:6px 0 44px}
.timer-done-msg{font-size:clamp(1.3rem,5vw,1.8rem);font-weight:600;letter-spacing:-.02em;
  text-align:center;margin-bottom:40px;line-height:1.3;white-space:pre-line}

/* nearby */
.nb-hero{width:100%;max-width:340px;border-radius:16px;padding:20px 20px 16px;
  background:var(--red-bg);border:1px solid var(--red-bd);margin-bottom:14px;animation:fadeUp .3s both}
.nb-hero-lbl{font-size:.62rem;letter-spacing:.12em;text-transform:uppercase;color:var(--red);margin-bottom:10px}
.nb-hero-name{font-size:1.05rem;font-weight:700;line-height:1.25;margin-bottom:4px}
.nb-hero-type{font-size:.65rem;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.nb-hero-status{display:inline-flex;align-items:center;gap:6px;padding:4px 10px;border-radius:6px;
  background:rgba(229,57,53,.2);border:1px solid var(--red-bd);font-size:.72rem;font-weight:700;
  letter-spacing:.07em;text-transform:uppercase;color:var(--red);margin-bottom:10px}
.nb-hero-travel{font-size:.78rem;color:var(--mid);margin-bottom:16px}
.nb-hero-call{display:flex;align-items:center;justify-content:center;gap:8px;padding:17px;
  border-radius:12px;background:var(--red);color:#fff;font-size:1rem;font-weight:800;
  letter-spacing:.02em;text-decoration:none;transition:opacity .14s;width:100%}
.nb-hero-call:active{opacity:.8}
.place-card{background:var(--card);border:1px solid var(--card-bd);border-radius:var(--r);
  padding:15px 17px;width:100%;max-width:340px;margin-bottom:10px;animation:fadeUp .35s both}
.place-card.now  {background:var(--red-bg);border-color:var(--red-bd)}
.place-card.today{background:rgba(255,255,255,.05);border-color:rgba(255,255,255,.13)}
.place-top{display:flex;align-items:flex-start;justify-content:space-between;gap:10px;margin-bottom:3px}
.place-name{font-size:.9rem;font-weight:600;line-height:1.3;flex:1}
.place-travel{font-size:.7rem;color:var(--dim);white-space:nowrap;padding-top:2px;flex-shrink:0;text-align:right}
.place-type{font-size:.64rem;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);margin-bottom:8px}
.place-cost{font-size:.7rem;color:var(--dim);margin:4px 0 8px}
.day-group-header{font-size:.62rem;font-weight:700;letter-spacing:.1em;color:var(--dim);
  padding:18px 0 8px;text-transform:uppercase;border-top:1px solid #1a1a1a;margin-top:4px}
.badge{display:inline-flex;align-items:center;gap:5px;padding:4px 9px;border-radius:6px;
  font-size:.7rem;font-weight:700;letter-spacing:.07em;text-transform:uppercase;margin-bottom:8px}
.badge.now  {background:var(--red-bg);color:var(--red);border:1px solid var(--red-bd)}
.badge.today{background:rgba(255,255,255,.07);color:rgba(255,255,255,.82);border:1px solid rgba(255,255,255,.14)}
.badge.future{background:transparent;color:var(--dim);border:1px solid rgba(255,255,255,.08)}
.bdot{width:5px;height:5px;border-radius:50%;flex-shrink:0}
.badge.now .bdot{background:var(--red);animation:pulse 1.3s ease-in-out infinite}
.badge.today .bdot{background:rgba(255,255,255,.7)}
.badge.future .bdot{background:rgba(255,255,255,.22)}
.hl-card{padding:15px 17px;border-radius:var(--r);background:var(--red-bg);border:1px solid var(--red-bd);
  display:flex;flex-direction:column;gap:5px;width:100%;max-width:340px;margin-bottom:10px}
.hl-badge{font-size:.62rem;letter-spacing:.1em;text-transform:uppercase;color:var(--red)}
.hl-name{font-size:.9rem;font-weight:600}
.hl-desc{font-size:.72rem;color:var(--dim);line-height:1.45;margin-bottom:3px}
.hl-call{display:flex;align-items:center;justify-content:center;gap:6px;padding:11px;
  border-radius:8px;background:var(--red);color:#fff;font-size:.84rem;font-weight:700;
  letter-spacing:.03em;transition:opacity .14s}
.hl-call:active{opacity:.8}
.src-note{font-size:.6rem;color:var(--dim);letter-spacing:.06em;text-transform:uppercase;
  width:100%;max-width:340px;text-align:center;margin-bottom:10px}
.panic-bar{width:100%;max-width:340px;padding:10px 14px;border-radius:9px;
  background:var(--red-bg);border:1px solid var(--red-bd);font-size:.72rem;color:var(--red);
  font-weight:600;margin-bottom:14px;text-align:center}
.offline-box{width:100%;max-width:340px;padding:22px 20px;border-radius:var(--r);
  background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.1);text-align:center;margin-bottom:16px}
.offline-box h3{font-size:.95rem;font-weight:600;margin-bottom:6px}
.offline-box p{font-size:.78rem;color:var(--dim);line-height:1.6;margin-bottom:14px}
.spinner{width:24px;height:24px;border:2px solid rgba(255,255,255,.1);
  border-top-color:rgba(255,255,255,.5);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}

/* contacts */
.contact-card{background:var(--card);border:1px solid var(--card-bd);border-radius:var(--r);
  padding:15px 17px;width:100%;max-width:340px;margin-bottom:10px;animation:fadeUp .3s both}
.contact-name{font-size:.95rem;font-weight:600;margin-bottom:2px}
.contact-role{font-size:.66rem;letter-spacing:.08em;text-transform:uppercase;color:var(--dim);margin-bottom:10px}
.empty-msg{font-size:.95rem;color:var(--dim);text-align:center;line-height:1.7;padding:28px 0}
.field-lbl{font-size:.66rem;letter-spacing:.09em;text-transform:uppercase;color:var(--dim);
  margin-bottom:7px;display:block;width:100%;max-width:340px}
.field-in{width:100%;max-width:340px;background:var(--card);border:1px solid var(--card-bd);
  border-radius:9px;padding:13px 15px;font-size:.95rem;color:var(--fg);margin-bottom:12px}
.field-in:focus{border-color:rgba(255,255,255,.28)}
.field-in::placeholder{color:var(--dim)}
.type-row{display:flex;gap:7px;width:100%;max-width:340px;margin-bottom:20px}
.type-opt{flex:1;padding:11px 6px;border-radius:9px;font-size:.78rem;font-weight:600;
  text-align:center;background:var(--card);border:1px solid var(--card-bd);color:var(--mid);cursor:pointer}
.type-opt.on{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3);color:#fff}

/* checkin */
.ci-q{font-size:1rem;font-weight:600;margin-bottom:13px;width:100%;max-width:340px}
.yn-row{display:flex;gap:9px;width:100%;max-width:340px;margin-bottom:22px}
.yn{flex:1;padding:14px;border-radius:10px;font-size:.9rem;font-weight:600;
  background:var(--card);border:1px solid var(--card-bd);color:var(--mid);cursor:pointer;text-align:center}
.yn.yes{background:rgba(229,57,53,.15);border-color:var(--red-bd);color:var(--red)}
.yn.no {background:rgba(255,255,255,.08);border-color:rgba(255,255,255,.25);color:#fff}
.scale-row{display:flex;gap:5px;width:100%;max-width:340px;margin:10px 0 22px}
.scale-n{flex:1;aspect-ratio:1;border-radius:7px;background:var(--card);border:1px solid var(--card-bd);
  font-size:.78rem;font-weight:600;color:var(--dim);cursor:pointer;
  display:flex;align-items:center;justify-content:center}
.scale-n.on{background:var(--red-bg);border-color:var(--red-bd);color:var(--red)}

/* reasons */
.chip-wrap{display:flex;flex-wrap:wrap;gap:8px;width:100%;max-width:340px;margin-bottom:18px}
.chip{padding:10px 15px;border-radius:30px;background:var(--card);border:1px solid var(--card-bd);
  font-size:.85rem;color:var(--mid);cursor:pointer;display:flex;align-items:center;gap:7px}
.chip.on{background:rgba(255,255,255,.1);border-color:rgba(255,255,255,.3);color:#fff}
.chip-del{font-size:.68rem;opacity:.45}
.chip-add-row{display:flex;gap:8px;width:100%;max-width:340px;margin-bottom:8px}
.chip-input{flex:1;background:var(--card);border:1px solid var(--card-bd);border-radius:9px;
  padding:12px 14px;font-size:.9rem;color:var(--fg)}
.chip-input::placeholder{color:var(--dim)}

/* reflection */
.refl-q{font-size:.82rem;color:var(--dim);letter-spacing:.04em;margin-bottom:7px;
  display:block;width:100%;max-width:340px}
.refl-ta{width:100%;max-width:340px;background:var(--card);border:1px solid var(--card-bd);
  border-radius:10px;padding:13px 15px;font-size:.92rem;color:var(--fg);resize:none;
  min-height:76px;margin-bottom:12px;line-height:1.5}
.refl-ta::placeholder{color:var(--dim)}
</style>
</head>
<body>
<div id="app">

  <!-- BADGES -->
  <div id="admin-badge">ADMIN</div>
  <div id="phase-badge"></div>

  <!-- 1. OPEN -->
  <div class="screen active" id="s-open">
    <div class="pulse-dot"></div>
    <h1 class="headline" id="main-title"></h1>
    <p class="subline" id="open-sub"></p>
    <button class="btn btn-white" onclick="APP.go('s-confirm')" id="btn-confirm"></button>
  </div>

  <!-- 2. CONFIRMED -->
  <div class="screen" id="s-confirm">
    <span class="checkmark">✔</span>
    <p id="confirmed-text" style="font-size:clamp(1rem,4vw,1.2rem);color:var(--mid);text-align:center;margin-bottom:52px;line-height:1.6;white-space:pre-line"></p>
    <div class="btn-stack">
      <button class="btn btn-danger" id="btn-struggle" onclick="APP.go('s-panic')"></button>
      <button class="btn btn-ghost"  id="btn-continue" onclick="APP.goHome()"></button>
    </div>
  </div>

  <!-- 3. PANIC -->
  <div class="screen" id="s-panic">
    <div class="audio-wrap">
      <div class="aplay" onclick="AUDIO.toggle()">
        <svg id="a-svg" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
      </div>
      <div class="atrack">
        <span class="alabel" id="audio-label"></span>
        <div class="aprog"><div class="aprog-fill" id="a-fill"></div></div>
      </div>
      <div class="waveform paused" id="waveform">
        <div class="wv"></div><div class="wv"></div><div class="wv"></div>
        <div class="wv"></div><div class="wv"></div><div class="wv"></div>
      </div>
    </div>
    <p class="panic-msg" id="panic-msg"></p>
    <div class="btn-stack">
      <button class="btn btn-ghost"   id="btn-wait10"  onclick="TIMER.start(10)"></button>
      <button class="btn btn-outline" id="btn-findhelp" onclick="APP.goNearbyPanic()"></button>
      <button class="btn btn-red"     id="btn-callhl"  onclick="APP.go('s-helplines')"></button>
    </div>
    <button class="back-btn" onclick="APP.back()" style="margin-top:18px;justify-content:center">
      <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M19 12H5M12 5l-7 7 7 7"/></svg>
      <span id="back-panic"></span>
    </button>
  </div>

  <!-- 4. TIMER -->
  <div class="screen" id="s-timer">
    <div class="ring-wrap">
      <svg viewBox="0 0 210 210">
        <circle class="ring-bg" cx="105" cy="105" r="96"/>
        <circle class="ring-fg" cx="105" cy="105" r="96" id="ring-fg" stroke-dasharray="603.2" stroke-dashoffset="0"/>
      </svg>

const COUNTRY_LANG = {
  LT:'lt', LV:'en', EE:'en',
  US:'en', GB:'en', AU:'en', NZ:'en', IE:'en', CA:'en',
  DE:'de', AT:'de', CH:'de',
  NO:'no', SE:'no', DK:'en', FI:'en',
  PL:'pl',
  FR:'en', BE:'en', ES:'en', MX:'en', AR:'en',
};

let _lang = 'en';

function detectBrowserLang() {
  const b = (navigator.language||'en').toLowerCase();
  if(b.startsWith('lt')) return 'lt';
  if(b.startsWith('de')) return 'de';
  if(b.startsWith('no')||b.startsWith('nb')||b.startsWith('nn')) return 'no';
  if(b.startsWith('pl')) return 'pl';
  return 'en';
}

function t(k) {
  const tr = LANGS[_lang]||LANGS.en;
  return tr[k]!==undefined ? tr[k] : (LANGS.en[k]||k);
}

function setLang(code) {
  _lang = LANGS[code] ? code : 'en';
  document.documentElement.lang = _lang;
  renderAllText();
}

async function detectLangFromLocation(lat, lng) {
  try {
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 5000);
    const r = await fetch(
      `https://api.bigdatacloud.net/data/reverse-geocode-client?latitude=${lat}&longitude=${lng}&localityLanguage=en`,
      { signal: ctrl.signal }
    );
    const d = await r.json();
    _countryCode = d.countryCode || '';
    const browser = detectBrowserLang();
    const country = COUNTRY_LANG[_countryCode] || 'en';
    const chosen  = LANGS[browser] ? browser : country;
    if(chosen !== _lang) setLang(chosen);
  } catch(e) { /* silent — keep browser language */ }
}

// ═══════════════════════════════════════════════════
const PHASE = {
  daysSinceFirstOpen() {
    const first = LS.get('first_open');
    if(!first) return 0;
    return Math.floor((Date.now() - parseInt(first)) / 86400000);
  },
  unlocked() {
    return ADMIN.isOn() || this.daysSinceFirstOpen() >= 5;
  },
};

function updatePhaseBadge() {
  const badge = document.getElementById('phase-badge');
  const d = PHASE.daysSinceFirstOpen();
  if(ADMIN.isOn()) {
    badge.textContent = 'Admin';
  } else {
    badge.textContent = d + 'd · Phase ' + (PHASE.unlocked() ? '2' : '1');
  }
  badge.classList.add('on');
}

// ═══════════════════════════════════════════════════
//  NAVIGATION
// ═══════════════════════════════════════════════════
let current = 's-open';
let history  = [];

const NAV_SCREENS = ['s-home','s-contacts','s-reasons','s-checkin'];
const NAV_IDS     = ['nb-home','nb-contacts','nb-reasons','nb-checkin'];
const PHASE2_SCREENS = ['s-contacts','s-add-contact','s-reasons','s-checkin','s-reflection'];

const APP = {
  go(id) {
    if(!document.getElementById(id)) return;
    if(current === id) return;
    if(PHASE2_SCREENS.includes(id) && !PHASE.unlocked()) {
      toast(t('toastLocked')); return;
    }
    history.push(current);
    const from = document.getElementById(current);
    const to   = document.getElementById(id);
    from.classList.add('exit');
    setTimeout(() => {
      from.classList.remove('active','exit');
      to.classList.add('active');
      to.scrollTop = 0;
      current = id;
      this._onEnter(id);
      updateNav();
    }, 260);
  },
  nav(id) { history = []; this.go(id); },
  back() {
    if(current === 's-nearby') NEARBY.panicMode = false;
    const prev = history.pop() || (PHASE.unlocked() ? 's-home' : 's-day');
    const from = document.getElementById(current);
    const to   = document.getElementById(prev);
    if(!to) return;
    from.classList.add('exit');
    setTimeout(() => {
      from.classList.remove('active','exit');
      to.classList.add('active');
      to.scrollTop = 0;
      current = prev;
      this._onEnter(prev);
      updateNav();
    }, 260);
  },
  goHome() { PHASE.unlocked() ? this.nav('s-home') : this.nav('s-day'); },
  goNearbyPanic() { NEARBY.panicMode = true; this.go('s-nearby'); },
  reset() {
    document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active','exit'));
    document.getElementById('s-open').classList.add('active');
    document.getElementById('nav').classList.remove('on');
    current = 's-open'; history = [];
    AUDIO.stop(); TIMER.reset();
    NEARBY.panicMode = false;
  },
  dismissUnlock() {
    LS.set('unlock_shown','1');
    document.getElementById('unlock-banner').classList.remove('on');
  },
  _onEnter(id) {
    if(id==='s-panic')    AUDIO.enterPanic();
    if(id==='s-home')     { updateHomeDays(); ADMIN.apply(); }
    if(id==='s-day')      ADMIN.apply();
    if(id==='s-timer')    TIMER.reset();
    if(id==='s-contacts') CONTACTS.render();
    if(id==='s-reasons')  REASONS.render();
    if(id==='s-checkin')  CI.reset();
    if(id==='s-nearby')   NEARBY.resetUI();
    if(id==='s-helplines')renderHelplines();
    ADMIN.apply();
  },
};

function updateNav() {
  const show = PHASE.unlocked() && NAV_SCREENS.includes(current);
  document.getElementById('nav').classList.toggle('on', show);
  NAV_IDS.forEach((id,i) => {
    document.getElementById(id).classList.toggle('on', NAV_SCREENS[i]===current);
  });
  document.querySelectorAll('.screen.scroll').forEach(s => {
    s.style.paddingBottom = show ? '84px' : '44px';
  });
}

function updateHomeDays() {
  const d = STATE.days;
  const el = document.getElementById('home-days');
  if(el) el.textContent = d>=2 ? d+t('daysN') : d===1 ? t('days1') : t('days0');
}

// ═══════════════════════════════════════════════════
function toast(msg) {
  let el = document.getElementById('_toast');
  if(!el) {
    el = document.createElement('div');
    el.id = '_toast';
    el.style.cssText = 'position:fixed;bottom:100px;left:50%;transform:translateX(-50%);' +
      'background:rgba(255,255,255,.13);border:1px solid rgba(255,255,255,.2);' +
      'backdrop-filter:blur(12px);color:#fff;padding:10px 20px;border-radius:30px;' +
      'font-size:.82rem;font-weight:600;z-index:9999;transition:opacity .3s;pointer-events:none;' +
      'font-family:var(--f);white-space:nowrap';
    document.body.appendChild(el);
  }
  el.textContent = msg;
  el.style.opacity = '1';
  clearTimeout(el._t);
  el._t = setTimeout(() => el.style.opacity = '0', 2200);
}

// ═══════════════════════════════════════════════════
//  ADMIN TRIGGER: triple-tap OR long-press on title
// ═══════════════════════════════════════════════════
function initAdminTrigger() {
  const el = document.getElementById('main-title');
  let taps = 0, tapT = null, pressT = null;

  el.addEventListener('click', () => {
    taps++;
    clearTimeout(tapT);
    if(taps >= 3) { taps = 0; ADMIN.toggle(); return; }
    tapT = setTimeout(() => taps = 0, 600);
  });
  el.addEventListener('pointerdown', () => {
    pressT = setTimeout(() => { taps = 0; ADMIN.toggle(); }, 700);
  });
  el.addEventListener('pointerup',    () => clearTimeout(pressT));
  el.addEventListener('pointercancel',() => clearTimeout(pressT));
}

const AUDIO = {
  playing: false, timer: null, pct: 0, _startT: null,
  enterPanic() {
    this.stop();
    this.pct = 0;
    const f = document.getElementById('a-fill');
    if(f) f.style.width = '0%';
    // Delay auto-start slightly; cancel if user navigates away
    clearTimeout(this._startT);
    this._startT = setTimeout(() => {
      if(current === 's-panic') this.start();
    }, 600);
  },
  start() {
    if(this.playing) return;
    this.playing = true;
    document.getElementById('a-svg').innerHTML = '<rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/>';
    document.getElementById('waveform').classList.remove('paused');
    const fill = document.getElementById('a-fill');
    const step = 100 / (47 * 10);
    this.timer = setInterval(() => {
      this.pct += step;
      fill.style.width = Math.min(this.pct, 100) + '%';
      if(this.pct >= 100) this.stop();
    }, 100);
  },
  stop() {
    this.playing = false;
    clearInterval(this.timer);
    clearTimeout(this._startT);
    const s = document.getElementById('a-svg');
    if(s) s.innerHTML = '<path d="M8 5v14l11-7z"/>';
    const w = document.getElementById('waveform');
    if(w) w.classList.add('paused');
  },
  toggle() { this.playing ? this.stop() : this.start(); },
};

// ═══════════════════════════════════════════════════
//  TIMER
// ═══════════════════════════════════════════════════
const CIRC = 603.2;
const TIMER = {
  interval: null, total: 600, left: 600, running: false,
  start(minutes) {
    this.reset();
    this.total = this.left = minutes * 60;
    this._display(this.left);
    setText('t-sub', t('timerMinutes'));
    setText('t-start', t('timerStart'));
    APP.go('s-timer');
  },
  startMorning() {
    this.reset();
    const now = new Date(), m = new Date(now);
    m.setHours(7,0,0,0);
    if(m <= now) m.setDate(m.getDate()+1);
    this.total = this.left = Math.floor((m-now)/1000);
    this._display(this.left);
    setText('t-sub', t('waitMorning').replace(/[⏱🌙]\s*/g,''));
    setText('t-start', t('timerStart'));
    APP.go('s-timer');
  },
  begin() {
    if(this.running) return;
    this.running = true;
    setText('t-start', '...');
    this.interval = setInterval(() => {
      this.left--;
      this._display(this.left);
      if(this.left <= 0) {
        clearInterval(this.interval);
        this.running = false;
        STATE.days = Math.max(STATE.days, 1);
        LS.set('days', String(STATE.days));
        LS.set('lastDate', new Date().toDateString());
        APP.go('s-timer-done');
      }
    }, 1000);
  },
  reset() {
    clearInterval(this.interval);
    this.running = false; this.left = 600; this.total = 600;
    const d = document.getElementById('t-digits');
    if(d) d.textContent = '10:00';
    const r = document.getElementById('ring-fg');
    if(r) r.style.strokeDashoffset = 0;
  },
  _display(secs) {
    const h=Math.floor(secs/3600), m=Math.floor((secs%3600)/60), s=secs%60;
    const d = document.getElementById('t-digits');
    if(d) d.textContent = h>0
      ? `${p2(h)}:${p2(m)}:${p2(s)}`
      : `${p2(m)}:${p2(s)}`;
    const r = document.getElementById('ring-fg');
    if(r) r.style.strokeDashoffset = CIRC * (1 - (this.total>0 ? this.left/this.total : 1));
  },
};
function p2(n){ return String(n).padStart(2,'0'); }

    const el = document.getElementById('contacts-list');

};

//  REASONS
// ═══════════════════════════════════════════════════
const DEFAULT_REASONS = ['Health','Family','Sport','Money'];
const REASONS = {
  add() {
    const inp = document.getElementById('reason-input');
    const v = inp.value.trim();
    if(!v) return;
    if(!STATE.reasons.includes(v)) { STATE.reasons.push(v); LS.set('reasons', STATE.reasons); }
    inp.value = '';
    this.render();
  },
  toggle(r) {
    if(STATE.reasons.includes(r)) {
      STATE.reasons = STATE.reasons.filter(x=>x!==r);
    } else {
      STATE.reasons.push(r);
    }
    LS.set('reasons', STATE.reasons);
    this.render();
  },
  render() {
    const wrap = document.getElementById('chip-wrap');
    if(!wrap) return;
    const all = [...DEFAULT_REASONS, ...STATE.reasons.filter(r=>!DEFAULT_REASONS.includes(r))];
    wrap.innerHTML = all.map((r,i) => {
      const on = STATE.reasons.includes(r);
      // Use data-idx to avoid apostrophe/quote issues in onclick
      return `<div class="chip${on?' on':''}" data-reason="${esc(r)}" onclick="REASONS.toggleByEl(this)">${esc(r)}${on?'<span class="chip-del">✕</span>':''}</div>`;
    }).join('');
    const inp = document.getElementById('reason-input');
    if(inp&&!inp._kb){ inp._kb=true; inp.addEventListener('keydown',e=>{if(e.key==='Enter')REASONS.add();}); }
  },
  toggleByEl(el) {
    const r = el.dataset.reason;
    if(r) this.toggle(r);
  },
};

    this.state.drank = v;

  },
  ynHelp(v) {
    this.state.help = v;
    document.getElementById('ci-hyes').className = 'yn'+(v==='yes'?' yes':'');

    this.state.craving = n;
    document.querySelectorAll('.scale-n').forEach(b=>b.classList.toggle('on',+b.textContent<=n));

    LS.set('last_ci', JSON.stringify({...this.state, date:new Date().toDateString()}));

};

function getFallbackPlaces(lat, lng) {
  const US_COUNTRIES = ['US','USA','United States'];
  const isUS = US_COUNTRIES.includes(_countryCode) || _countryCode === '';

  // Non-US: use country-specific INTL_FALLBACK
  if(!isUS) {
    const intl = INTL_FALLBACK[_countryCode];
    if(intl && intl.length) return intl;
    // No country data — last resort
    return AA_SEED_DATA.slice(0, 5);
  }

  // US: filter seed dataset by 50km radius (~31 miles)
  const RADIUS_KM = 50;
  const nearby = AA_SEED_DATA.filter(p => {
    if(!p.lat || !p.lng) return false;
    return haversine(lat, lng, p.lat, p.lng) <= RADIUS_KM;
  });
  if(nearby.length >= 3) return nearby;
  // Sparse area — return 5 closest
  return [...AA_SEED_DATA]
    .map(p => ({ ...p, _d: haversine(lat, lng, p.lat, p.lng) }))
    .sort((a,b) => a._d - b._d)
    .slice(0, 5);
}

  const el = document.getElementById('hl-list');

}

const TYPE_I18N = {
  aa:'typeAA', therapy:'typeTherapy', crisis:'typeCrisis',
  recovery:'typeRecovery', helpline:'typeHelpline',
};

const _cache = {};
function cacheRead(k) { const c=_cache[k]; return c&&c.exp>Date.now()?c.v:null; }
function cacheSet(k,v,ttl=300) { _cache[k]={v,exp:Date.now()+ttl*1000}; }

// Time helpers
function nowMin() { const n=new Date(); return n.getHours()*60+n.getMinutes(); }
function toMin(s) { const [h,m]=(s+':0').split(':').map(Number); return h*60+m; }
function is247(sl){ return sl&&sl.start==='00:00'&&sl.end==='23:59'; }

function getTimeInfo(place) {
  if(!place.slots||!place.slots.length) return null;
  const now     = new Date();
  const todayDay = now.getDay();
  const nowM     = now.getHours()*60 + now.getMinutes();
  let best = null;

  // Search across all 7 days (today first, then tomorrow, then rest of week)
  for(let offset=0; offset<7; offset++) {
    const checkDay = (todayDay + offset) % 7;
    for(const sl of place.slots) {
      if(!sl.days||!sl.days.includes(checkDay)) continue;

      if(is247(sl)) {
        return {isNow:true, isToday:true, slot:sl, minutesUntil:0, daysUntil:0};
      }

      const startM = toMin(sl.start);
      const endM   = toMin(sl.end);

      if(offset === 0) {
        // Today
        if(nowM >= startM && nowM < endM) {
          return {isNow:true, isToday:true, slot:sl, minutesUntil:0, daysUntil:0};
        }
        if(nowM < startM) {
          const u = startM - nowM;
          if(!best || u < best.minutesUntil) {
            best = {isNow:false, isToday:true, slot:sl, minutesUntil:u, daysUntil:0};
          }
        }
      } else {
        // Future day — minutes = days*1440 + time from midnight
        const totalMins = offset*1440 + startM;
        if(!best || totalMins < best.minutesUntil) {
          best = {isNow:false, isToday:false, slot:sl, minutesUntil:totalMins, daysUntil:offset};
        }
      }
    }
    // If we already found something today, don't look further
    if(best && best.daysUntil === 0) break;
  }
  return best;
}

// Day names for badge — resolved at render time via t()
const BADGE_DAYS_EN = ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];

function makeBadge(info) {
  if(!info) return {cls:'future', text: t('statusFuture')};

  // Happening right now
  if(info.isNow) {
    return {cls:'now', text: is247(info.slot) ? t('status247') : t('statusNow')};
  }

  const days = info.daysUntil || 0;
  const mins = info.minutesUntil || 0;
  const startTime = info.slot?.start || '';

  if(days === 0) {
    // Today — show exact countdown
    const h = Math.floor(mins/60), m = mins%60;
    let countdown;
    if(h > 0) {
      countdown = `${t('inMin')} ${h}${t('hourSfx')} ${m > 0 ? m+t('minSfx') : ''}`.trim();
    } else {
      countdown = `${t('inMin')} ${m} ${t('minSfx')}`;
    }
    return {cls:'today', text:`${t('statusToday')} ${startTime} · ${countdown}`};
  }

  if(days === 1) {
    // Tomorrow
    return {cls:'future', text:`${t('tmrw')} · ${startTime}`};
  }

  // 2–6 days away — show day name + time
  const dayName = BADGE_DAYS_EN[(new Date().getDay() + days) % 7];
  return {cls:'future', text:`${dayName} · ${startTime} · ${t('inMin')} ${days} ${t('daySfx')}`};
}

function sortScore(p) {
  const info = p._info;
  if(!info) return 9999999;
  if(info.isNow)   return p.dist || 0;                         // now: sort by distance
  const mins = info.minutesUntil || 9999;
  return mins * 100 + (p.dist || 0);                           // future: sort by time then distance
}

function haversine(a,b,c,d) {
  const R=6371,dL=(c-a)*Math.PI/180,dG=(d-b)*Math.PI/180;
  const x=Math.sin(dL/2)**2+Math.cos(a*Math.PI/180)*Math.cos(c*Math.PI/180)*Math.sin(dG/2)**2;
  return R*2*Math.atan2(Math.sqrt(x),Math.sqrt(1-x));
}
function mapsUrl(name,lat,lng) { return `https://www.google.com/maps/search/?api=1&query=${encodeURIComponent(name)}&center=${lat},${lng}`; }
function fmtDist(d) { return d==null?'': d<1?Math.round(d*1000)+' m':d.toFixed(1)+' km'; }
function fmtTravel(dMin,wMin,dist) {
  const parts=[];
  if(dMin!=null) parts.push(`🚗 ${dMin} ${t('minSfx')}`);
  else if(dist!=null) parts.push(fmtDist(dist));
  if(wMin!=null&&wMin<=20) parts.push(`🚶 ${wMin} ${t('minSfx')}`);
  return parts.join('  ');
}
function fmtCost(c) { return c==='free'?t('costFree'):c==='insurance'?t('costIns'):(c||''); }
function typeLabel(type) { return t(TYPE_I18N[type]||'')||type; }

// ─── DATA LAYER ───────────────────────────────────────────────
const PROXY_URL           = '/.netlify/functions/meetings'; // Netlify proxy
const GOOGLE_API_KEY      = ''; // ← paste Google Maps API key to enable Places
const INTERGROUP_SOURCES  = 53; // number of state/city sources in Netlify function

async function fetchAA(lat, lng) {
  const k = `aa_${lat.toFixed(2)}_${lng.toFixed(2)}`;
  const cached = cacheRead(k); if(cached) return cached;
  try {
    const ctrl = new AbortController();
    setTimeout(() => ctrl.abort(), 10000);
    const url  = `${PROXY_URL}?lat=${lat}&lng=${lng}&miles=30`;
    const r    = await fetch(url, {signal: ctrl.signal});
    if(!r.ok) throw new Error(`Proxy ${r.status}`);
    const data = await r.json();

    // Handle both formats: array OR {meetings:[], source:''}
    const raw  = Array.isArray(data) ? data : (data.meetings || []);
    if(!raw.length) return [];

    const source = data.source || 'meeting-guide-api';
    console.log(`[fetchAA] ${source}: ${raw.length} raw records`);

    const meetings = raw
      .filter(m => m.day !== undefined && m.day !== null && m.day >= 0 && m.time)
      .map(m => {
        const day     = parseInt(m.day, 10);
        const timeStr = (m.time || '').substring(0, 5);
        if(day < 0 || day > 6 || !timeStr.includes(':')) return null;
        const [h, mi] = timeStr.split(':').map(Number);
        const end     = `${String((h+1)%24).padStart(2,'0')}:${String(mi).padStart(2,'0')}`;
        return {
          id:            String(m.id || ''),
          name:          String(m.name || m.meeting_name || 'AA Meeting').trim(),
          type:          'aa',
          lat:           parseFloat(m.lat || m.latitude)  || null,
          lng:           parseFloat(m.lng || m.longitude) || null,
          address:       m.address || '',
          city:          m.city || '',
          state:         m.state || '',
          country:       m.country || 'US',
          phone:         m.phone || null,
          cost:          'free',
          source,
          types:         Array.isArray(m.types) ? m.types : [],
          notes:         m.notes || '',
          timezone:      m.timezone || '',
          slots:         [{days:[day], start:timeStr, end}],
        };
      })
      .filter(Boolean);

    cacheSet(k, meetings, 600);
    console.log(`[fetchAA] normalized: ${meetings.length} meetings`);
    return meetings;
  } catch(e) {
    console.warn('[fetchAA] failed:', e.message);
    return [];
  }
}

// Layer 2: Google Places (optional — requires API key)
async function fetchGoogle(lat, lng) {
  if(!GOOGLE_API_KEY) return [];
  const k=`gp_${lat.toFixed(3)}_${lng.toFixed(3)}`;
  const cached=cacheRead(k); if(cached) return cached;
  const queries=[
    {q:'Alcoholics Anonymous meeting', type:'aa'},
    {q:'addiction recovery center',    type:'recovery'},
    {q:'substance abuse treatment',    type:'therapy'},
  ];
  let results=[];
  for(const {q,type} of queries) {
    try {
      const url=`https://maps.googleapis.com/maps/api/place/nearbysearch/json?location=${lat},${lng}&radius=16000&keyword=${encodeURIComponent(q)}&key=${GOOGLE_API_KEY}`;
      const r=await fetch(url);
      const data=await r.json();
      (data.results||[]).slice(0,4).forEach(p=>{
        results.push({
          name:p.name, type,
          lat:p.geometry.location.lat, lng:p.geometry.location.lng,
          phone:null, cost:null, source:'google',
          address:p.vicinity||null,
          slots:[],
          isNow:!!p.opening_hours?.open_now,
          // Google Places has no schedule — mark as 24/7 if currently open
          ...(p.opening_hours?.open_now ? {
            slots:[{days:[0,1,2,3,4,5,6],start:'00:00',end:'23:59'}]
          } : {}),
        });
      });
    } catch(e) {}
  }
  const seen=new Set();
  results=results.filter(p=>!seen.has(p.name)&&seen.add(p.name));
  cacheSet(k, results, 600);
  return results;
}

const NEARBY = {
  panicMode: false,

        <p style="font-size:.72rem;color:var(--dim);text-align:center">Checking ${INTERGROUP_SOURCES} sources…</p>
      </div>`;
  },

  requestLoc() {
    this.loading(t('loadLoc'));
    if(!navigator.geolocation) { this.renderOffline(); return; }
    navigator.geolocation.getCurrentPosition(
      pos => this.fetchAll(pos.coords.latitude, pos.coords.longitude),
      ()  => this.renderLocFail(),
      {timeout:8000, maximumAge:0, enableHighAccuracy:false}
    );
  },

  renderOffline() {
    document.getElementById('nearby-body').innerHTML = `
      <div class="offline-box">
        <h3>${esc(t('offline'))}</h3>
        <p>${esc(t('offlineSub'))}</p>
      </div>
      ${this._hlCards()}`;
  },

  renderLocFail() {
    document.getElementById('nearby-body').innerHTML = `
      <div class="offline-box">
        <h3>${esc(t('locFail'))}</h3>
        <p>${esc(t('locFailSub'))}</p>
        <a class="btn btn-outline" href="https://www.aa.org/find-aa" target="_blank" style="margin-top:4px;padding:14px;text-align:center">${esc(t('searchAA'))}</a>
      </div>
      ${this._hlCards()}`;
  },

  async fetchAll(lat, lng) {
    // Step 1: detect country + refine language
    await detectLangFromLocation(lat, lng);

    this.loading(t('loadSrc'));

    // Check connectivity
    let online = false;
    try {
      const c=new AbortController(); setTimeout(()=>c.abort(),3000);
      await fetch('https://www.google.com/favicon.ico',{mode:'no-cors',signal:c.signal});
      online = true;
    } catch(e) {}
    if(!online) { this.renderOffline(); return; }

    this.loading(t('loadMeet'));

    // Layer 1: Netlify proxy → tries CORS proxies + state-specific intergroup feeds
    let places = await fetchAA(lat, lng);

    // Layer 2: Google Places (optional — requires API key)
    if(GOOGLE_API_KEY && places.length < 5) {
      const gpPlaces = await fetchGoogle(lat, lng);
      places = [...places, ...gpPlaces];
    }

    // Layer 3: Regional static fallback — always pad to at least 3
    const hasReal = places.length > 0;
    if(places.length < 3) places = [...places, ...getFallbackPlaces(lat, lng)];

    // Deduplicate by name+city
    const seen = new Set();
    places = places.filter(p => {
      const k = `${(p.name||'').toLowerCase()}|${(p.city||'').toLowerCase()}`;
      if(seen.has(k)) return false;
      seen.add(k); return true;
    });

    // Annotate with distance and time info
    places = places.map(p => {
      const dist = haversine(lat, lng, p.lat||lat, p.lng||lng);
      const info = p.slots?.length
        ? getTimeInfo(p)
        : (p.isNow ? {isNow:true,isToday:true,slot:{start:'',end:''},minutesUntil:0,daysUntil:0} : null);
      const drivingMin = dist<1 ? 1 : Math.round((dist/48.28)*60);
      return {
        ...p, dist,
        isNow:       info?.isNow    || false,
        isToday:     info?.isToday  || false,
        minutesUntil:info?.minutesUntil || null,
        daysUntil:   info?.daysUntil ?? null,
        _info:       info,
        drivingMin,
      };
    });

    // Panic mode: only show meetings happening right now
    if(this.panicMode) places = places.filter(p => p.isNow);

    // Sort: now → soonest today → tomorrow → this week → by distance
    places.sort((a,b) => sortScore(a) - sortScore(b));

    // Show ALL meetings — no cap (panic mode already filtered above)
    this.render(places, hasReal);
  },

  render(places, hasReal) {
    let h = '';

    if(this.panicMode) h += `<div class="panic-bar">${esc(t('panicBar'))}</div>`;

    // Source note — shows where data came from + count
    const hasPipeline = places.some(p => p.source === 'pipeline-api');
    const hasMG       = places.some(p => p.source === 'meeting-guide' || p.source === 'meeting-guide-api');
    const hasTSML     = places.some(p => p.source === 'tsml-feed' || p.source === 'intergroup-feed');
    const hasSeed     = places.some(p => p.source === 'seed');
    const liveCount   = places.filter(p => p.source !== 'seed').length;

    let srcNote;
    if(hasMG)       srcNote = `${t('srcReal')} · ${liveCount} meetings`;
    else if(hasTSML) srcNote = `${t('srcReal').replace('Meeting Guide','Intergroup')} · ${liveCount} meetings`;
    else if(hasPipeline) srcNote = `${t('srcReal')} · ${liveCount} meetings`;
    else             srcNote = t('srcFallback');
    h += `<div class="src-note">${esc(srcNote)}</div>`;

    if(places.length===0) {
      h += `<div class="offline-box"><h3>${esc(this.panicMode?t('noResultsPanic'):t('noResults'))}</h3></div>`;
    } else {
      // Hero card
      const hero=places[0];
      const hBadge=makeBadge(hero._info);
      const hTravel=fmtTravel(hero.drivingMin,null,hero.dist);
      const hHref=hero.phone?`tel:${hero.phone.replace(/\D/g,'')}`:'';
      const hMap=mapsUrl(hero.name,hero.lat,hero.lng);
      h += `<div class="nb-hero">
        <div class="nb-hero-lbl">${esc(t('heroLabel'))}</div>
        <div class="nb-hero-name">${esc(hero.name)}</div>
        <div class="nb-hero-type">${esc(typeLabel(hero.type))}</div>
        <div class="nb-hero-status"><span class="bdot" style="background:var(--red);animation:pulse 1.3s ease-in-out infinite"></span>${esc(hBadge.text)}</div>
        ${hTravel?`<div class="nb-hero-travel">${esc(hTravel)}</div>`:''}
        <div style="display:flex;gap:8px">
          ${hHref ? `<a class="nb-hero-call" href="${hHref}" style="flex:2">${esc(t('callNow'))}</a>`
                  : `<a class="nb-hero-call" href="${hMap}" target="_blank" style="flex:2">${esc(t('goBtn'))} →</a>`}
          <a class="bsm bsm-ghost" href="${hMap}" target="_blank" style="flex:1;padding:17px 10px">${esc(t('goBtn'))}</a>
        </div>
      </div>`;

      // Other cards — grouped by day
      let currentGroup = null;
      places.slice(1).forEach((p,i)=>{
        const badge  = makeBadge(p._info);
        const travel = fmtTravel(p.drivingMin,null,p.dist);
        const cc     = p.isNow?'now':p.isToday?'today':'';
        const callBtn= p.phone?`<a class="bsm bsm-red" href="tel:${p.phone.replace(/\D/g,'')}">${esc(t('callBtn'))}</a>`:'';
        const mapBtn = `<a class="bsm bsm-ghost" href="${mapsUrl(p.name,p.lat,p.lng)}" target="_blank">${esc(t('goBtn'))}</a>`;
        const timeRow= p._info && p._info.slot && p._info.slot.start && !is247(p._info.slot)
          ? `<div style="font-size:.7rem;color:var(--dim);margin:4px 0 7px">🕐 ${p._info.slot.start}–${p._info.slot.end}</div>` : '';
        const costRow= p.cost?`<div class="place-cost">💰 ${esc(fmtCost(p.cost))}</div>`:'';

        // Day group header
        const days    = p._info?.daysUntil ?? 99;
        const groupKey= p.isNow ? 'now' : p.isToday ? 'today' : `day_${days}`;
        if(groupKey !== currentGroup) {
          currentGroup = groupKey;
          let groupLabel;
          if(groupKey === 'now')   groupLabel = '🔴 ' + t('statusNow').toUpperCase();
          else if(groupKey === 'today') groupLabel = t('statusToday').toUpperCase();
          else {
            const dayName = BADGE_DAYS_EN[(new Date().getDay() + days) % 7];
            groupLabel = `${dayName.toUpperCase()} · ${t('inMin')} ${days} ${t('daySfx')}`.toUpperCase();
          }
          h += `<div class="day-group-header">${esc(groupLabel)}</div>`;
        }

        h += `<div class="place-card ${cc}" style="animation-delay:${(i+1)*.03}s">
          <div class="place-top">

          </div>
          <div class="place-type">${esc(typeLabel(p.type))}</div>
          <div class="badge ${badge.cls}"><span class="bdot"></span>${esc(badge.text)}</div>

    h += `<div style="width:100%;max-width:340px;margin-top:12px">

(function boot() {
  // First open timestamp
  if(!LS.get('first_open')) LS.set('first_open', String(Date.now()));

  // Streak
  const today = new Date().toDateString();
  if(STATE.lastDate !== today) {
    if(STATE.lastDate) {
      const diff = Math.round((new Date(today)-new Date(STATE.lastDate))/86400000);
      STATE.days  = diff===1 ? STATE.days+1 : 0;
    }
    STATE.lastDate = today;
    LS.set('days',     String(STATE.days));
    LS.set('lastDate', today);
  }

  // Step 1: set language from browser immediately
  setLang(detectBrowserLang());

  // Step 2: admin + phase
  ADMIN.apply();
  updatePhaseBadge();

  // Step 3: admin trigger
  initAdminTrigger();

  // Step 4: show phase 2 unlock banner once
  if(PHASE.unlocked() && !LS.get('unlock_shown')) {
    setTimeout(()=>document.getElementById('unlock-banner').classList.add('on'), 800);
  }

  // Step 5: silently get real location to refine language
  if(navigator.geolocation) {
    navigator.geolocation.getCurrentPosition(
      pos => detectLangFromLocation(pos.coords.latitude, pos.coords.longitude),
      ()  => {},
      {timeout:5000, maximumAge:3600000, enableHighAccuracy:false}
    );
  }
// ── Service Worker Registration ──────────────────────────────
if('serviceWorker' in navigator) {
  window.addEventListener('load', () => {
    navigator.serviceWorker.register('/sw.js')
      .then(() => console.log('SW registered'))
      .catch(e => console.log('SW failed:', e));
  });
}
})();
</script>
